{% extends "base.html" %}
{% block title %}Үр дүн{% endblock %}
{% block content %}
<div class="result-box">
  <h2>Тестийн үр дүн</h2>
  <div class="score-circle">
    <span id="onoo">0</span><small>/30</small>
  </div>

  <div class="weak-topics">
    <h3>⚠️ Сул сэдвүүд</h3>
    <div id="weak-list"><!-- JS дүүргэнэ --></div>
  </div>

  <div class="ai-questions" id="ai-section" style="display:none">
    <h3>🤖 AI нэмэлт дасгал</h3>
    <p>Алдаатай сэдвүүд дээр нэмэлт асуулт үүсгэж байна...</p>
    <div id="ai-questions-list"></div>
  </div>

  <div class="result-actions">
    <button class="btn-primary" onclick="location.href='/'">Дахин тест өгөх</button>
    <button class="btn-secondary" onclick="loadAIQuestions()">🤖 AI дасгал үзэх</button>
  </div>
</div>
{% endblock %}
{% block extra_js %}
  <script src="{{ url_for('static', filename='js/test.js') }}"></script>
{% endblock %}
