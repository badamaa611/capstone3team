{% extends "base.html" %}
{% block title %}Тест{% endblock %}
{% block extra_css %}
  <link rel="stylesheet" href="{{ url_for('static', filename='css/test.css') }}">
{% endblock %}
{% block content %}
<div class="test-header">
  <div class="test-info">
    <span id="hicheel-ner">{{ hicheel }}</span>
    <span>{{ angi }}-р анги</span>
  </div>
  <div class="timer" id="timer">80:00</div>
  <div class="progress">
    <span id="current-q">1</span> / <span id="total-q">30</span>
  </div>
</div>

<div class="question-box" id="question-box">
  <p class="q-number">Асуулт <span id="q-num">1</span></p>
  <p class="q-text" id="q-text">Асуулт ачааллаж байна...</p>
  <div class="options" id="options">
    <!-- JS-ээр дүүргэнэ -->
  </div>
</div>

<div class="test-nav">
  <button class="btn-secondary" id="prev-btn" onclick="prevQuestion()">← Өмнөх</button>
  <button class="btn-primary"   id="next-btn" onclick="nextQuestion()">Дараах →</button>
  <button class="btn-danger"    id="finish-btn" style="display:none" onclick="finishTest()">Дуусгах</button>
</div>
{% endblock %}
{% block extra_js %}
  <script src="{{ url_for('static', filename='js/test.js') }}"></script>
{% endblock %}
